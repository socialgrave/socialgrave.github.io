<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>socialgrave</title>

<style>
body {
  margin: 0;
  background: black;
  color: white;

  font-family: monospace;

  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  overflow: hidden;
  text-align: center;
}

#text {
  font-size: clamp(24px, 4vw, 56px);
  max-width: 90%;
  letter-spacing: 1px;
  white-space: pre-wrap;
}

.cursor {
  display: inline-block;
  animation: blink 0.8s infinite;
}

@keyframes blink {
  50% { opacity: 0; }
}
</style>
</head>

<body>

<div id="text"></div>

<script>

const FORGET_TIME = 1000 * 60 * 60 * 6;

let now = Date.now();
let lastVisit = localStorage.getItem("lastVisit");
let visits = localStorage.getItem("visits");

if (!lastVisit || now - lastVisit > FORGET_TIME) {
    visits = 0;
} else {
    visits = parseInt(visits || 0);
}

visits += 1;

localStorage.setItem("visits", visits);
localStorage.setItem("lastVisit", now);

const messages = [
  "what are you looking for?",
  "you've been here before.",
  "still looking?",
  "no new messages.",
  "the conversation ended.",
  "i don’t remember you."
];

let text = messages[Math.min(visits - 1, messages.length - 1)];

let i = 0;
const speed = 55;

function type() {
  if (i < text.length) {
    document.getElementById("text").innerHTML += text[i];
    i++;
    setTimeout(type, speed);
  } else {
    document.getElementById("text").innerHTML += "<span class='cursor'>_</span>";
  }
}

type();
</script>

</body>
</html>
